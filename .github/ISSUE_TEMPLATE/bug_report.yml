name: Bug report
description: Report a reproducible problem in SectorForge.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please do not include secrets, private game paths, telemetry captures, or exploit details in a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The dashboard stops receiving live telemetry after...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest reliable steps that trigger the problem.
      placeholder: |
        1. Run .\tools\dev.ps1
        2. Open http://localhost:5173
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API or collector
        - Web dashboard
        - SQLite storage
        - Game adapter
        - Dev tooling
        - Documentation
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Paste the commit SHA, branch, release, or approximate date you tested.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Windows version, .NET SDK version, Node.js version, and browser when relevant.
      placeholder: |
        Windows 11
        .NET SDK 10.0.203
        Node.js 24.x
        Chrome/Edge ...
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add safe logs or screenshots. Remove local paths, tokens, captures, or private data first.
